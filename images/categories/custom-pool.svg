<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Custom pool - freeform shape top view -->
  <g transform="translate(40, 50)">
    <!-- Pool deck -->
    <path d="M60 40 Q20 100 40 200 Q60 290 160 300 Q260 310 300 240 Q320 180 290 100 Q260 40 180 30 Q100 20 60 40Z" fill="#8B9DAF" stroke="#A0B4C8" stroke-width="3"/>
    <!-- Water -->
    <path d="M70 55 Q35 110 52 200 Q68 278 158 288 Q248 298 285 232 Q305 175 278 105 Q252 52 178 43 Q108 34 70 55Z" fill="url(#poolGrad2)"/>
    <!-- Caustics -->
    <ellipse cx="170" cy="170" rx="50" ry="35" fill="rgba(255,255,255,0.12)" transform="rotate(-15 170 170)"/>
    <ellipse cx="130" cy="220" rx="30" ry="20" fill="rgba(255,255,255,0.08)"/>
    <!-- Island/feature -->
    <circle cx="220" cy="140" r="25" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  </g>
  <defs>
    <linearGradient id="poolGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>
  </defs>
</svg>
