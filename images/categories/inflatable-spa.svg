<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Inflatable spa - round, 3/4 view -->
  <g transform="translate(40, 70)">
    <!-- Inflatable body -->
    <ellipse cx="160" cy="220" rx="140" ry="60" fill="#4A5568"/>
    <path d="M20 160 Q20 240 160 250 Q300 240 300 160 L300 100 Q300 60 160 50 Q20 60 20 100Z" fill="url(#inflatableBody)"/>
    <!-- Inflated rim segments -->
    <ellipse cx="160" cy="80" rx="140" ry="45" fill="#5A6577" stroke="#6B7280" stroke-width="1.5"/>
    <ellipse cx="160" cy="80" rx="140" ry="45" fill="url(#inflatableRim)"/>
    <!-- Water -->
    <ellipse cx="160" cy="90" rx="115" ry="34" fill="url(#inflatableWater)"/>
    <!-- Bubbles -->
    <circle cx="130" cy="85" r="3" fill="rgba(255,255,255,0.4)"/>
    <circle cx="160" cy="80" r="4" fill="rgba(255,255,255,0.35)"/>
    <circle cx="190" cy="88" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="145" cy="95" r="2" fill="rgba(255,255,255,0.3)"/>
    <circle cx="175" cy="78" r="3" fill="rgba(255,255,255,0.35)"/>
    <!-- Control unit -->
    <rect x="280" y="120" width="35" height="80" rx="8" fill="#374151" stroke="#4B5563" stroke-width="1.5"/>
    <rect x="288" y="135" width="19" height="10" rx="3" fill="#22D3EE"/>
    <circle cx="297" cy="165" r="6" fill="#4B5563" stroke="#6B7280" stroke-width="1"/>
  </g>
  <defs>
    <linearGradient id="inflatableBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="inflatableRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="inflatableWater" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
  </defs>
</svg>
