<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Jacuzzi / Hot tub - 3/4 view -->
  <g transform="translate(40, 60)">
    <!-- Body -->
    <path d="M40 180 Q40 280 160 290 Q280 280 280 180 L280 120 Q280 80 240 70 L80 70 Q40 80 40 120Z" fill="url(#jacuzziBody)"/>
    <!-- Rim -->
    <ellipse cx="160" cy="120" rx="120" ry="50" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="2"/>
    <!-- Water surface -->
    <ellipse cx="160" cy="125" rx="105" ry="42" fill="url(#jacuzziWater)"/>
    <!-- Jets/bubbles -->
    <circle cx="120" cy="120" r="4" fill="rgba(255,255,255,0.5)"/>
    <circle cx="140" cy="130" r="3" fill="rgba(255,255,255,0.4)"/>
    <circle cx="180" cy="118" r="5" fill="rgba(255,255,255,0.5)"/>
    <circle cx="200" cy="128" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="160" cy="110" r="3" fill="rgba(255,255,255,0.4)"/>
    <circle cx="130" cy="115" r="2" fill="rgba(255,255,255,0.3)"/>
    <circle cx="190" cy="122" r="4" fill="rgba(255,255,255,0.35)"/>
    <!-- Control panel -->
    <rect x="245" y="150" width="30" height="60" rx="6" fill="#94A3B8"/>
    <circle cx="260" cy="168" r="5" fill="#22D3EE"/>
    <circle cx="260" cy="188" r="5" fill="#64748B"/>
  </g>
  <defs>
    <linearGradient id="jacuzziBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <linearGradient id="jacuzziWater" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>
</svg>
