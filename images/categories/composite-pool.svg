<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Composite pool - top view -->
  <g transform="translate(50, 60)">
    <!-- Pool border/deck -->
    <rect x="20" y="20" width="260" height="280" rx="16" fill="#8B9DAF" stroke="#A0B4C8" stroke-width="3"/>
    <!-- Water surface -->
    <rect x="35" y="35" width="230" height="250" rx="12" fill="url(#poolGrad1)"/>
    <!-- Steps -->
    <rect x="35" y="35" width="230" height="40" rx="8" fill="rgba(255,255,255,0.15)"/>
    <rect x="35" y="55" width="230" height="20" rx="4" fill="rgba(255,255,255,0.08)"/>
    <!-- Water caustics -->
    <ellipse cx="150" cy="180" rx="60" ry="40" fill="rgba(255,255,255,0.12)"/>
    <ellipse cx="200" cy="140" rx="40" ry="30" fill="rgba(255,255,255,0.08)"/>
    <!-- Lane line -->
    <line x1="150" y1="80" x2="150" y2="280" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="8 6"/>
  </g>
  <defs>
    <linearGradient id="poolGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>
  </defs>
</svg>
