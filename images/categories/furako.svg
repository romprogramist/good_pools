<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Furako - Japanese wooden barrel bath -->
  <g transform="translate(60, 40)">
    <!-- Barrel body -->
    <path d="M30 150 Q30 310 140 320 Q250 310 250 150 L250 100 Q250 60 140 50 Q30 60 30 100Z" fill="url(#woodGrad)"/>
    <!-- Wood planks (vertical lines) -->
    <line x1="70" y1="70" x2="65" y2="310" stroke="rgba(139,90,43,0.3)" stroke-width="1.5"/>
    <line x1="110" y1="55" x2="108" y2="318" stroke="rgba(139,90,43,0.3)" stroke-width="1.5"/>
    <line x1="150" y1="52" x2="152" y2="320" stroke="rgba(139,90,43,0.3)" stroke-width="1.5"/>
    <line x1="190" y1="55" x2="192" y2="318" stroke="rgba(139,90,43,0.3)" stroke-width="1.5"/>
    <line x1="225" y1="65" x2="228" y2="312" stroke="rgba(139,90,43,0.3)" stroke-width="1.5"/>
    <!-- Metal bands -->
    <ellipse cx="140" cy="130" rx="110" ry="15" fill="none" stroke="#8B8682" stroke-width="4"/>
    <ellipse cx="140" cy="220" rx="118" ry="16" fill="none" stroke="#8B8682" stroke-width="4"/>
    <!-- Rim -->
    <ellipse cx="140" cy="80" rx="110" ry="35" fill="#C68B59" stroke="#A0714A" stroke-width="2"/>
    <!-- Water surface -->
    <ellipse cx="140" cy="85" rx="95" ry="28" fill="url(#furakoWater)"/>
    <!-- Steam wisps -->
    <path d="M100 50 Q95 30 105 15" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none"/>
    <path d="M140 45 Q135 25 145 10" stroke="rgba(255,255,255,0.15)" stroke-width="2" fill="none"/>
    <path d="M180 50 Q175 30 185 15" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none"/>
  </g>
  <defs>
    <linearGradient id="woodGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="50%" stop-color="#B8834A"/>
      <stop offset="100%" stop-color="#8B5E2B"/>
    </linearGradient>
    <linearGradient id="furakoWater" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>
</svg>
