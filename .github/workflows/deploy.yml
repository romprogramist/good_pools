name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR
    steps:
      - uses: actions/checkout@v4

      - name: Write deploy key
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "secret length: ${#SSH_PRIVATE_KEY_B64}"
          printf '%s' "$SSH_PRIVATE_KEY_B64" | tr -d '[:space:]' | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "key file size: $(wc -c < ~/.ssh/deploy_key) bytes"
          echo "key first line: $(head -1 ~/.ssh/deploy_key)"
          ssh-keygen -y -f ~/.ssh/deploy_key | head -1

      - name: Verify SSH to server
        run: ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "whoami && hostname"

      - name: Deploy backend to /var/www/good-pools/
        run: |
          EXTRA=""
          [ -f package-lock.json ] && EXTRA="package-lock.json"
          rsync -az --delete-after -e "ssh $SSH_OPTS" \
            package.json $EXTRA server.js create-admin.js \
            routes middleware views db \
            "$SSH_USER@$SSH_HOST:/var/www/good-pools/"

      - name: Deploy frontend to /var/www/good-pools/public/
        run: |
          rsync -az --delete-after -e "ssh $SSH_OPTS" \
            --exclude='models.html.bak' \
            index.html catalog.html models.html portfolio.html \
            slider-data.js \
            css js images data \
            "$SSH_USER@$SSH_HOST:/var/www/good-pools/public/"

      - name: Install deps, migrate DB, restart PM2
        run: |
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" bash -s <<'EOF'
            set -e
            cd /var/www/good-pools
            npm install --omit=dev
            node db/migrate.js
            pm2 restart good-pools
          EOF
